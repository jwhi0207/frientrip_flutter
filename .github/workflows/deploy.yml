name: Deploy to Play Store & TestFlight

on:
  push:
    branches: [main]

jobs:
  deploy-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Create firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      - name: Build release AAB
        run: flutter build appbundle --release --build-number=$((GITHUB_RUN_NUMBER + 100))

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Install Google API client
        run: pip install google-api-python-client google-auth

      - name: Upload to Internal and Closed Testing
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          python3 - <<'EOF'
          import glob
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          import google.auth

          PACKAGE_NAME = "com.bennybokki.frientrip"
          TRACKS = ["internal", "alpha"]

          credentials, _ = google.auth.default(
              scopes=["https://www.googleapis.com/auth/androidpublisher"]
          )
          service = build("androidpublisher", "v3", credentials=credentials)

          edit = service.edits().insert(packageName=PACKAGE_NAME, body={}).execute()
          edit_id = edit["id"]

          aab_path = glob.glob("build/app/outputs/bundle/release/*.aab")[0]
          media = MediaFileUpload(aab_path, mimetype="application/octet-stream")
          bundle = service.edits().bundles().upload(
              packageName=PACKAGE_NAME,
              editId=edit_id,
              media_body=media
          ).execute()

          version_code = bundle["versionCode"]
          print(f"Uploaded version code: {version_code}")

          for track in TRACKS:
              service.edits().tracks().update(
                  packageName=PACKAGE_NAME,
                  editId=edit_id,
                  track=track,
                  body={
                      "track": track,
                      "releases": [{"versionCodes": [version_code], "status": "completed"}]
                  }
              ).execute()
              print(f"Assigned to {track}")

          service.edits().commit(packageName=PACKAGE_NAME, editId=edit_id).execute()
          print("Done")
          EOF

  deploy-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 -d > lib/firebase_options.dart

      - name: Create GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > ios/Runner/GoogleService-Info.plist

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo -n "$P12_BASE64" | base64 -D -o $CERTIFICATE_PATH
          echo -n "$PROFILE_BASE64" | base64 -D -o $PROFILE_PATH

          echo "P12 file size: $(wc -c < $CERTIFICATE_PATH) bytes"
          echo "Profile file size: $(wc -c < $PROFILE_PATH) bytes"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          echo "Identities after import:"
          security find-identity -v $KEYCHAIN_PATH || true

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Disable Flutter SPM integration
        run: flutter config --no-enable-swift-package-manager

      - name: Build IPA
        run: flutter build ipa --release --build-number=$((GITHUB_RUN_NUMBER + 100)) --export-options-plist=ios/ExportOptions.plist

      - name: Upload to App Store Connect
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY_DIR=~/.private_keys
          mkdir -p $API_KEY_DIR
          echo "$API_KEY_BASE64" | base64 --decode -o "$API_KEY_DIR/AuthKey_$API_KEY_ID.p8"

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
