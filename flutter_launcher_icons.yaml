flutter_launcher_icons:
  android: true
  ios: true
  # Composite icon used for iOS and pre-API-26 Android fallback
  image_path: "assets/images/app_icon.webp"
  # Android adaptive icon (API 26+)
  adaptive_icon_background: "assets/images/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/images/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/images/ic_launcher_monochrome.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  # Skip other platforms
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
