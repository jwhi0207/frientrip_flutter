flutter_native_splash:
  # Brand teal fills the entire screen in both light and dark mode
  color: "#33B6C7"
  image: assets/images/frientrip_logo.png

  color_dark: "#33B6C7"
  image_dark: assets/images/frientrip_logo.png

  # Android 12+ — icon circle blends seamlessly into the teal background
  android_12:
    color: "#33B6C7"
    color_dark: "#33B6C7"
    image: assets/images/ic_launcher_foreground.png
    image_dark: assets/images/ic_launcher_foreground.png
    icon_background_color: "#33B6C7"
    icon_background_color_dark: "#33B6C7"

  android: true
  ios: true
  web: false
