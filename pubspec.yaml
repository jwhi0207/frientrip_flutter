name: frientrip
description: "Frientrip - Trip expense and group management"
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  # firebase_core 4.x pulls Android BoM 34.x with firebase-auth 24.x, which
  # fixes the session-loss regression introduced by 23.2.1 encrypted storage
  # (firebase/firebase-android-sdk#7111)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  google_sign_in: ^6.2.1
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^18.0.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  gal: ^2.3.0
  path_provider: ^2.1.5
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
